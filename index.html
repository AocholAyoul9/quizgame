<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FJU LYON | Quiz Biblique – Journée des Talents</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

</head>
<body>
<div class="game-container">
    <div class="hero">
        <div class="hero-icons">
            <i class="fas fa-church"></i>
            <i class="fas fa-theater-masks"></i>
            <i class="fas fa-palette"></i>
            <i class="fas fa-microphone-alt"></i>
            <i class="fas fa-music"></i>
        </div>
        <h1>QUIZ BIBLIQUE</h1>
        <div class="group-name"> FJU LYON – TALENT DAY </div>
    </div>
    
    <div class="talents-bar">
        <div class="talent-item"><i class="fas fa-music"></i> <span>DANSE</span></div>
        <div class="talent-item"><i class="fas fa-theater-masks"></i> <span>THÉÂTRE</span></div>
        <div class="talent-item"><i class="fas fa-microphone-alt"></i> <span>CHANT</span></div>
        <div class="talent-item"><i class="fas fa-palette"></i> <span>DESSIN</span></div>
    </div>
    
    <div class="stats-panel">
        <div class="score-box"><i class="fas fa-trophy"></i> SCORE: <span id="scoreValue">0</span></div>
        <div class="q-counter"><i class="fas fa-bible"></i> QUESTION: <span id="questionCounter">0</span> / <span id="totalQuestions">0</span></div>
    </div>
    
    <div class="quiz-area">
        <div class="question-text" id="questionText">Charge les questions de la Bible...</div>
        <div class="options-grid" id="optionsContainer"></div>
        <div class="feedback-area" id="feedbackMsg"></div>
        <button class="next-btn" id="nextButton" disabled><i class="fas fa-arrow-right"></i> QUESTION SUIVANTE</button>
        <button class="next-btn reset-btn" id="resetButton"><i class="fas fa-sync-alt"></i> RECOMMENCER</button>
    </div>
    
    <div class="footer-note">
        <i class="fas fa-heart" style="color: #0c2f6c;"></i> FJU LYON | TALENT DAY! <i class="fas fa-star" style="color: #d4a11e;"></i>
    </div>
</div>

<script
    src="script.js"></script>
</body>
</html>
